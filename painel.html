<script>
const SUPABASE_URL = 'https://fcrzzuyfmdkkelylphdm.supabase.co';
const SUPABASE_KEY = 'sb_publishable_n_EVOo3TszHpm25nWNIj0w_Z9U36-3P';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// PROTEÇÃO TOTAL
async function iniciar() {
  try {
    const { data: { session } } = await db.auth.getSession();

    if (!session) {
      window.location.href = 'index.html';
      return;
    }

    const user = session.user;
    const meta = user.user_metadata || {};

    const nome = meta.full_name || meta.name || 'Soldado';

    // VERIFICA SE ELEMENTOS EXISTEM (evita tela branca)
    if (document.getElementById('perfilNome'))
      document.getElementById('perfilNome').textContent = nome;

    if (document.getElementById('navNome'))
      document.getElementById('navNome').textContent = nome;

    if (document.getElementById('fichaNome'))
      document.getElementById('fichaNome').textContent = nome;

    // AVATAR
    if (meta.avatar_url || meta.picture) {
      const avatar = meta.avatar_url || meta.picture;

      const el = document.getElementById('perfilAvatar');
      if (el) {
        el.outerHTML = `<img src="${avatar}" class="perfil-avatar">`;
      }
    }

  } catch (err) {
    console.error('ERRO:', err);
    alert('Erro no sistema, abre o console (F12)');
  }
}

iniciar();
</script>
