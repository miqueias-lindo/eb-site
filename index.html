<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EB DO RAFA — ACESSO AO SISTEMA</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* =============================================
   RESET & VARIABLES
============================================= */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  /* Core palette - military terminal */
  --bg-void:     #020a04;
  --bg-deep:     #040e06;
  --bg-base:     #061209;
  --bg-card:     rgba(6, 18, 9, 0.97);
  --bg-input:    rgba(0, 0, 0, 0.5);

  /* Green spectrum */
  --g-bright:    #00ff88;
  --g-main:      #00dd66;
  --g-dim:       #00aa44;
  --g-ghost:     rgba(0,255,136,0.06);
  --g-border:    rgba(0,255,136,0.18);
  --g-border2:   rgba(0,255,136,0.38);

  /* Accent */
  --red:         #ff3333;
  --red-dim:     rgba(255,51,51,0.15);
  --gold:        #ffc857;
  --blue-dc:     #5865F2;

  /* Text */
  --text-bright: #e8fff3;
  --text-main:   rgba(180,255,220,0.8);
  --text-dim:    rgba(100,200,140,0.45);
  --text-muted:  rgba(60,140,90,0.3);

  /* Typography */
  --font-hud:    'Orbitron', monospace;
  --font-mono:   'Share Tech Mono', monospace;
  --font-ui:     'Rajdhani', sans-serif;
}

/* =============================================
   BASE
============================================= */
html { overflow: hidden; height: 100%; }

body {
  min-height: 100vh;
  background: var(--bg-void);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  position: relative;
  overflow: hidden;
}

/* =============================================
   BACKGROUND LAYERS
============================================= */
/* Grid */
.bg-grid {
  position: fixed;
  inset: 0;
  z-index: 0;
  background-image:
    linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
}

/* Scanlines */
.bg-scan {
  position: fixed;
  inset: 0;
  z-index: 1;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.06) 2px,
    rgba(0,0,0,0.06) 4px
  );
  pointer-events: none;
}

/* Vignette */
.bg-vignette {
  position: fixed;
  inset: 0;
  z-index: 2;
  background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 40%, rgba(0,0,0,0.75) 100%);
  pointer-events: none;
}

/* Glow center */
.bg-glow {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(0,200,80,0.04) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  animation: glowPulse 4s ease-in-out infinite;
}
@keyframes glowPulse {
  0%, 100% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  50%       { opacity: 0.5; transform: translate(-50%,-50%) scale(1.15); }
}

/* Canvas particles */
#bgCanvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* =============================================
   BOOT LOADER
============================================= */
#bootScreen {
  position: fixed;
  inset: 0;
  background: var(--bg-void);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.5rem;
}

.boot-emblem {
  font-size: 3.5rem;
  animation: bootEmblem 0.6s ease 0.2s both;
  filter: drop-shadow(0 0 20px rgba(0,255,136,0.5));
}
@keyframes bootEmblem {
  from { opacity:0; transform: scale(0.5) rotate(-180deg); }
  to   { opacity:1; transform: scale(1) rotate(0deg); }
}

.boot-title {
  font-family: var(--font-hud);
  font-size: clamp(1.6rem, 5vw, 2.8rem);
  font-weight: 900;
  color: #fff;
  letter-spacing: 8px;
  animation: bootSlide 0.7s ease 0.6s both;
}
.boot-title em { color: var(--g-bright); font-style:normal; }
@keyframes bootSlide {
  from { opacity:0; transform: translateY(20px); }
  to   { opacity:1; transform: translateY(0); }
}

.boot-sub {
  font-size: 0.62rem;
  letter-spacing: 5px;
  color: var(--text-dim);
  text-transform: uppercase;
  animation: bootSlide 0.6s ease 0.9s both;
}

.boot-progress {
  width: min(300px, 70vw);
  height: 2px;
  background: rgba(0,255,136,0.08);
  overflow: hidden;
  animation: bootSlide 0.5s ease 1.1s both;
}
.boot-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--g-dim), var(--g-bright));
  box-shadow: 0 0 12px var(--g-bright);
  animation: bootFill 1.6s cubic-bezier(.4,0,.2,1) 1.2s both;
  width: 0;
}
@keyframes bootFill { to { width: 100%; } }

.boot-status {
  font-size: 0.55rem;
  letter-spacing: 4px;
  color: var(--text-muted);
  text-transform: uppercase;
  animation: bootSlide 0.5s ease 1.3s both;
}

/* =============================================
   MAIN CONTAINER
============================================= */
.wrap {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 460px;
  padding: 1.5rem;
}

/* =============================================
   HEADER / LOGO
============================================= */
.logo-area {
  text-align: center;
  margin-bottom: 2rem;
  animation: fadeUp 0.8s ease both;
}

.logo-icon {
  font-size: 3rem;
  display: block;
  margin-bottom: 0.75rem;
  filter: drop-shadow(0 0 16px rgba(0,255,136,0.6));
  animation: iconFloat 3s ease-in-out infinite;
}
@keyframes iconFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50%       { transform: translateY(-4px) rotate(2deg); }
}

/* Glitch effect */
.logo-glitch {
  font-family: var(--font-hud);
  font-size: clamp(1.6rem, 5vw, 2.2rem);
  font-weight: 900;
  color: #fff;
  letter-spacing: 6px;
  position: relative;
  display: inline-block;
  text-transform: uppercase;
}
.logo-glitch span { color: var(--g-bright); }

.logo-glitch::before,
.logo-glitch::after {
  content: attr(data-text);
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
}
.logo-glitch::before {
  color: var(--red);
  animation: glitch1 4s infinite;
  clip-path: polygon(0 0, 100% 0, 100% 30%, 0 30%);
}
.logo-glitch::after {
  color: var(--g-bright);
  animation: glitch2 4s infinite;
  clip-path: polygon(0 70%, 100% 70%, 100% 100%, 0 100%);
}

@keyframes glitch1 {
  0%,88%,100% { transform:translate(0); opacity:0; }
  90%          { transform:translate(-3px,1px); opacity:0.8; }
  92%          { transform:translate(2px,-1px); opacity:0.6; }
  94%          { transform:translate(0); opacity:0; }
}
@keyframes glitch2 {
  0%,88%,100% { transform:translate(0); opacity:0; }
  91%          { transform:translate(3px,1px); opacity:0.7; }
  93%          { transform:translate(-2px,0); opacity:0.5; }
  95%          { transform:translate(0); opacity:0; }
}

.logo-tagline {
  font-size: 0.58rem;
  letter-spacing: 4px;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-top: 0.4rem;
}

/* Status indicator */
.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  background: rgba(0,255,136,0.05);
  border: 1px solid var(--g-border);
  padding: 4px 14px;
  margin-top: 0.75rem;
}
.status-dot {
  width: 6px; height: 6px;
  background: var(--g-bright);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--g-bright);
  animation: blink 1.4s infinite;
}
@keyframes blink {
  0%,100% { opacity:1; box-shadow:0 0 8px var(--g-bright); }
  50%      { opacity:0.2; box-shadow:none; }
}
.status-txt {
  font-size: 0.52rem;
  letter-spacing: 3px;
  color: var(--text-dim);
  text-transform: uppercase;
}

/* =============================================
   CARD
============================================= */
.card {
  background: var(--bg-card);
  border: 1px solid var(--g-border);
  padding: 2.25rem 2rem;
  position: relative;
  overflow: hidden;
  box-shadow:
    0 0 60px rgba(0,200,80,0.06),
    0 0 120px rgba(0,200,80,0.03),
    inset 0 1px 0 rgba(0,255,136,0.08);
  animation: fadeUp 0.9s ease 0.1s both;
}

/* Animated top border sweep */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: -100%; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--g-main), transparent);
  animation: sweep 3s linear infinite;
}
@keyframes sweep {
  from { left: -100%; }
  to   { left: 100%; }
}

/* Corner accents */
.card::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 24px; height: 24px;
  border-top: 1px solid var(--g-main);
  border-right: 1px solid var(--g-main);
}

.corner-tl, .corner-bl, .corner-br {
  position: absolute;
  width: 14px; height: 14px;
  border-color: var(--g-dim);
  border-style: solid;
}
.corner-tl { top:0;    left:0;  border-width: 1px 0 0 1px; }
.corner-bl { bottom:0; left:0;  border-width: 0 0 1px 1px; }
.corner-br { bottom:0; right:0; border-width: 0 1px 1px 0; }

/* =============================================
   TABS
============================================= */
.tabs {
  display: flex;
  margin-bottom: 2rem;
  border: 1px solid var(--g-border);
  position: relative;
}

.tab-indicator {
  position: absolute;
  bottom: 0; left: 0;
  width: 50%; height: 100%;
  background: rgba(0,255,136,0.06);
  border-bottom: 2px solid var(--g-bright);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  pointer-events: none;
}

.tab-btn {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 3px;
  padding: 12px;
  cursor: pointer;
  text-transform: uppercase;
  transition: color 0.2s;
  position: relative;
  z-index: 1;
}
.tab-btn.active { color: var(--g-bright); }
.tab-btn:hover:not(.active) { color: var(--text-dim); }

.tab-panel {
  display: none;
  animation: fadeUp 0.3s ease;
}
.tab-panel.active { display: block; }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}

/* =============================================
   FORM ELEMENTS
============================================= */
.field {
  margin-bottom: 1.1rem;
  position: relative;
}

.field-label {
  display: block;
  font-size: 0.52rem;
  letter-spacing: 3px;
  color: var(--g-dim);
  text-transform: uppercase;
  margin-bottom: 0.4rem;
}

.field-input {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--g-border);
  color: var(--text-bright);
  font-family: var(--font-mono);
  font-size: 0.88rem;
  padding: 11px 14px;
  outline: none;
  transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  letter-spacing: 1px;
}
.field-input:focus {
  border-color: var(--g-main);
  background: rgba(0,200,80,0.03);
  box-shadow: 0 0 0 1px rgba(0,200,80,0.1);
}
.field-input::placeholder { color: rgba(255,255,255,0.1); }

/* Password specific */
.field-input[type="password"] { letter-spacing: 3px; }
.field-input[type="password"].revealed { letter-spacing: 1px; }

/* Eye toggle */
.eye-btn {
  position: absolute;
  right: 12px;
  bottom: 10px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 0.95rem;
  line-height: 1;
  transition: color 0.2s;
  user-select: none;
  z-index: 1;
}
.eye-btn:hover { color: var(--g-main); }

/* Password strength */
.strength-row {
  display: flex;
  gap: 3px;
  margin-top: 6px;
  margin-bottom: 0.9rem;
}
.strength-seg {
  flex: 1;
  height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  transition: background 0.3s, box-shadow 0.3s;
}
.strength-seg.s1 { background: var(--red); box-shadow: 0 0 6px var(--red); }
.strength-seg.s2 { background: #ff8800; box-shadow: 0 0 6px #ff8800; }
.strength-seg.s3 { background: var(--gold); box-shadow: 0 0 6px var(--gold); }
.strength-seg.s4 { background: var(--g-main); box-shadow: 0 0 6px var(--g-main); }

/* =============================================
   RATE LIMIT DOTS
============================================= */
.attempt-track {
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: flex-end;
  margin-bottom: 0.75rem;
}
.attempt-label {
  font-size: 0.48rem;
  letter-spacing: 2px;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-right: 2px;
}
.attempt-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  transition: background 0.3s, box-shadow 0.3s;
}
.attempt-dot.used {
  background: var(--red);
  box-shadow: 0 0 6px var(--red);
}
.attempt-dot.warn {
  background: var(--gold);
  box-shadow: 0 0 6px var(--gold);
}

/* =============================================
   BUTTONS
============================================= */
.btn-primary {
  width: 100%;
  background: transparent;
  border: 1px solid var(--g-main);
  color: var(--g-main);
  font-family: var(--font-mono);
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 4px;
  padding: 13px;
  cursor: pointer;
  text-transform: uppercase;
  position: relative;
  overflow: hidden;
  transition: color 0.25s;
}
.btn-primary::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--g-main);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
}
.btn-primary:hover::before,
.btn-primary:focus::before { transform: scaleX(1); }
.btn-primary:hover,
.btn-primary:focus { color: var(--bg-void); }
.btn-primary:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.btn-primary:disabled::before { display: none; }
.btn-primary span { position: relative; z-index: 1; }

.divider-or {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin: 1.25rem 0;
  font-size: 0.52rem;
  letter-spacing: 3px;
  color: var(--text-muted);
  text-transform: uppercase;
}
.divider-or::before,
.divider-or::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--g-border);
}

.btn-discord {
  width: 100%;
  background: transparent;
  border: 1px solid rgba(88,101,242,0.4);
  color: rgba(88,101,242,0.75);
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 2px;
  padding: 12px;
  cursor: pointer;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.6rem;
  transition: all 0.25s;
}
.btn-discord:hover {
  background: rgba(88,101,242,0.08);
  border-color: rgba(88,101,242,0.7);
  color: #7289da;
}
.discord-svg { width: 18px; height: 18px; fill: currentColor; }

/* =============================================
   ALERT MESSAGES
============================================= */
.alert {
  font-size: 0.63rem;
  letter-spacing: 1px;
  padding: 9px 12px;
  margin-bottom: 1rem;
  display: none;
  border-radius: 0;
  line-height: 1.5;
}
.alert.show { display: block; }
.alert.error {
  background: rgba(255,50,50,0.07);
  border: 1px solid rgba(255,80,80,0.3);
  color: #ff8080;
  animation: shake 0.4s ease;
}
.alert.success {
  background: rgba(0,200,80,0.06);
  border: 1px solid rgba(0,200,80,0.3);
  color: var(--g-main);
}
.alert.warn {
  background: rgba(255,200,0,0.06);
  border: 1px solid rgba(255,200,0,0.3);
  color: var(--gold);
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%      { transform: translateX(-5px); }
  40%      { transform: translateX(5px); }
  60%      { transform: translateX(-3px); }
  80%      { transform: translateX(3px); }
}

/* =============================================
   FOOTER
============================================= */
.card-footer {
  text-align: center;
  margin-top: 1.5rem;
  padding-top: 1rem;
  border-top: 1px solid var(--g-border);
}
.footer-text {
  font-size: 0.48rem;
  letter-spacing: 2px;
  color: var(--text-muted);
  text-transform: uppercase;
}
.security-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  margin-top: 0.4rem;
  font-size: 0.45rem;
  letter-spacing: 2px;
  color: rgba(0,255,136,0.2);
}
</style>
</head>

<div class="bg-grid"></div>
<div class="bg-scan"></div>
<div class="bg-glow"></div>
<div class="bg-vignette"></div>

<!-- =========================================
     BOOT SCREEN
========================================= -->
<div id="bootScreen">
  <div class="boot-emblem">🪖</div>
  <div class="boot-title">EB DO <em>RAFA</em></div>

        <label class="field-label">Senha</label>
        <input

          id="loginSenha"

const MAX_ATTEMPTS = 5;

function markAttempt() {
  loginAttempts++;
  for (let i = 1; i <= 5; i++) {
    const dot = document.getElementById(`att${i}`);

      dot.className = 'attempt-dot ' + (i >= 4 ? 'warn' : 'used');

      if (remaining <= 0) {
        clearInterval(interval);
        loginAttempts = 0;
        lockedUntil = 0;
        document.getElementById('btnLogin').disabled = false;
        for (let i = 1; i <= 5; i++) {

/* ─── PARTICLE CANVAS ─── */
const canvas = document.getElementById('bgCanvas');
const ctx    = canvas.getContext('2d');
let W, H, ptcs = [];

function resizeCanvas() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor() { this.reset(true); }
  reset(initial = false) {
    this.x     = Math.random() * W;
    this.y     = initial ? Math.random() * H : Math.random() * H;
    this.vx    = (Math.random() - 0.5) * 0.3;
    this.vy    = (Math.random() - 0.5) * 0.3;
    this.r     = Math.random() * 1.5 + 0.4;
    this.alpha = Math.random() * 0.35 + 0.05;
    this.life  = Math.random() * 0.5 + 0.5;
    this.decay = Math.random() * 0.003 + 0.0008;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life -= this.decay;
    if (this.life <= 0) this.reset();
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.life * this.alpha;
    ctx.fillStyle   = '#00ff88';
    ctx.shadowBlur  = 4;
    ctx.shadowColor = '#00ff88';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

for (let i = 0; i < 100; i++) ptcs.push(new Particle());

function animateCanvas() {
  ctx.clearRect(0, 0, W, H);
  ptcs.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateCanvas);
}
animateCanvas();

/* ─── TAB SWITCHER ─── */
function switchTab(name, idx) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`tabBtn${name === 'login' ? 'Login' : 'Cadastro'}`).classList.add('active');
  document.getElementById(`panel${name === 'login' ? 'Login' : 'Cadastro'}`).classList.add('active');
  document.getElementById('tabIndicator').style.transform = `translateX(${idx * 100}%)`;
}

/* ─── PASSWORD TOGGLE ─── */
function togglePwd(inputId, btn) {
  const input = document.getElementById(inputId);
  const show  = input.type === 'password';
  input.type  = show ? 'text' : 'password';
  input.classList.toggle('revealed', show);
  btn.textContent = show ? '🙈' : '👁';
  btn.title = show ? 'Ocultar senha' : 'Mostrar senha';
}

/* ─── PASSWORD STRENGTH ─── */
function checkStrength(val) {
  let score = 0;
  if (val.length >= 8)                score++;
  if (val.length >= 12)               score++;
  if (/[A-Z]/.test(val))             score++;
  if (/[0-9]/.test(val))             score++;
  if (/[^a-zA-Z0-9]/.test(val))      score++;

  const level = Math.min(4, score);
  const classes = ['', 's1', 's2', 's3', 's4'];
  for (let i = 1; i <= 4; i++) {
    const seg = document.getElementById(`seg${i}`);
    seg.className = `strength-seg ${i <= level ? classes[level] : ''}`;
  }
}

function showAlert(id, msg, type) {

}
function hideAlert(id) {

async function doLogin() {

  const nick  = document.getElementById('loginNick').value.trim();

}

/* ─── REGISTER ─── */
async function doRegister() {
  const nick  = document.getElementById('cadNick').value.trim();
  const email = document.getElementById('cadEmail').value.trim();
  const senha = document.getElementById('cadSenha').value;
  const conf  = document.getElementById('cadSenha2').value;

  hideAlert('alertCad');
  hideAlert('alertCadOk');

  if (!nick || !email || !senha || !conf) {
    showAlert('alertCad', '⚠ Preencha todos os campos.', 'error');
    return;
  }
  if (senha.length < 8) {
    showAlert('alertCad', '⚠ A senha deve ter pelo menos 8 caracteres.', 'error');
    return;
  }
  if (senha !== conf) {
    showAlert('alertCad', '⚠ As senhas não coincidem.', 'error');
    return;
  }

  const btn = document.getElementById('btnCad');
  const txt = document.getElementById('btnCadTxt');
  btn.disabled = true;
  txt.textContent = 'CRIANDO CONTA...';

  const { data, error } = await db.auth.signUp({
    email,
    password: senha,
    options: { data: { nick_roblox: nick } },
  });

  btn.disabled = false;
  txt.textContent = '⬡ CRIAR CONTA';

  if (error) {
    const msg = error.message.includes('already')
      ? '⚠ Este email já está cadastrado.'
      : '⚠ Erro ao criar conta. Tente novamente.';
    showAlert('alertCad', msg, 'error');
    return;
  }

  // Save nick in table
  await db.from('usuarios').insert({ nick, email, pode_enviar_relatorio: false });

  showAlert('alertCadOk', '✓ Conta criada! Você já pode fazer login.', 'success');
}
