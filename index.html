<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EB DO RAFA — LOGIN</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  background:#071a0b;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  font-family:'Share Tech Mono', monospace;
}

.card{
  background:#0a2410;
  border:1px solid rgba(0,255,136,0.2);
  padding:2rem;
  text-align:center;
  width:320px;
}

.title{
  color:#00ff88;
  font-family:'Rajdhani';
  font-size:1.5rem;
  margin-bottom:1rem;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  background:#5865F2;
  color:white;
  cursor:pointer;
  font-size:0.8rem;
  letter-spacing:2px;
}

.btn:hover{
  background:#4752c4;
}
</style>
</head>

<body>

<div class="card">
  <div class="title">EB DO RAFA</div>
  <button class="btn" onclick="loginDiscord()">
    ENTRAR COM DISCORD
  </button>
</div>

<script>
const SUPABASE_URL = 'https://fcrzzuyfmdkkelylphdm.supabase.co';
const SUPABASE_KEY = 'sb_publishable_n_EVOo3TszHpm25nWNIj0w_Z9U36-3P';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// LOGIN DISCORD
async function loginDiscord() {
  await db.auth.signInWithOAuth({
    provider: 'discord',
    options: {
      redirectTo: window.location.origin + '/painel.html'
    }
  });
}

// SE JÁ ESTIVER LOGADO
async function verificarLogin() {
  const { data: { session } } = await db.auth.getSession();

  if (session) {
    window.location.href = 'painel.html';
  }
}

verificarLogin();
</script>

</body>
</html>
